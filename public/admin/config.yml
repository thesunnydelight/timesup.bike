backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: src/assets/gallery
public_folder: /

collections:
  - name: home
    label: Home Page
    format: json
    editor:
      preview: false
    files:
      - label: Home Page Content
        name: home_content
        file: src/content/home.json
        fields:
          - label: Hero Section
            name: hero
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Tagline, name: tagline, widget: markdown }

          - label: How It Works
            name: howItWorks
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Text, name: text, widget: markdown }

          - label: Helpful Tips
            name: helpfulTips
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Tips, name: tips, widget: markdown }

          - label: Hours
            name: hours
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Text, name: text, widget: markdown }

          - label: Location
            name: location
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Text, name: text, widget: markdown }

          - label: Contact
            name: contact
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Email, name: email, widget: string }

          - label: Social Links
            name: socialLinks
            widget: object
            fields:
              - { label: Instagram URL, name: instagram, widget: string }
              - { label: Map URL, name: mapUrl, widget: string }

          - label: Gallery
            name: gallery
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - label: Images
                name: images
                widget: list
                summary: '{{fields.alt}}'
                fields:
                  - label: Image
                    name: src
                    widget: image
                    media_library:
                      allow_multiple: false
                  - { label: Caption (Alt Text), name: alt, widget: string }
